name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'agents/*.md'
      - 'docs/website.md'
      - 'scripts/check_site.py'
      - 'scripts/sync_project_docs.py'
      - 'site/**'
      - 'skills/**/SKILL.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      - name: Check generated public catalog
        run: python3 scripts/sync_project_docs.py --check
      - name: Validate website artifact
        run: |
          python3 scripts/check_site.py
          node --check site/app.js
      - name: Report private Pages availability
        if: github.event.repository.private && vars.ENABLE_PRIVATE_PAGES != 'true'
        run: |
          echo "::notice::Website validation passed. Deployment is skipped because this private repository's current plan does not support GitHub Pages."
      - name: Configure Pages
        if: github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload Pages artifact
        if: github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site

  deploy:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
