name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'agents/*.md'
      - 'docs/website.md'
      - 'scripts/check_site.py'
      - 'scripts/sync_project_docs.py'
      - 'site/**'
      - 'skills/**/SKILL.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
      - name: Check generated public catalog
        run: python3 scripts/sync_project_docs.py --check
      - name: Validate website artifact
        run: |
          python3 scripts/check_site.py
          node --check site/app.js
      - name: Report private Pages availability
        if: github.event.repository.private && vars.ENABLE_PRIVATE_PAGES != 'true'
        run: |
          echo "::notice::Website validation passed. Deployment is skipped because this private repository's current plan does not support GitHub Pages."
      - name: Configure Pages
        if: github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload Pages artifact
        if: github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
