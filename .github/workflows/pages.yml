name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'agents/*.md'
      - 'docs/website.md'
      - 'scripts/check_site.py'
      - 'scripts/sync_project_docs.py'
      - 'site/**'
      - 'skills/**/SKILL.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check generated public catalog
        run: python3 scripts/sync_project_docs.py --check
      - name: Validate website artifact
        run: |
          python3 scripts/check_site.py
          node --check site/app.js
      - name: Report private Pages availability
        if: github.event.repository.private && vars.ENABLE_PRIVATE_PAGES != 'true'
        run: |
          echo "::notice::Website validation passed. Deployment is skipped because this private repository's current plan does not support GitHub Pages."
      - name: Configure Pages
        if: github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event.repository.private == false || vars.ENABLE_PRIVATE_PAGES == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
