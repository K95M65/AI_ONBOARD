name: lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        # Vendored upstream Cloudflare scripts are excluded — they're kept verbatim (see NOTICE).
        # Gate on warning+ (actionable); info-level notes vary by shellcheck version and don't fail CI.
        run: |
          find . -path ./skills/cloudflare -prune -o -name '*.sh' -type f -print0 \
            | xargs -0r shellcheck --severity=warning

  validate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate JSON + TOML
        run: |
          python - <<'PY'
          import json, glob, tomllib, sys
          bad = 0
          for f in glob.glob("**/*.json", recursive=True):
              try: json.load(open(f))
              except Exception as e: bad += 1; print("JSON FAIL", f, e)
          for f in glob.glob("**/*.toml", recursive=True):
              try: tomllib.load(open(f, "rb"))
              except Exception as e: bad += 1; print("TOML FAIL", f, e)
          print("ok" if not bad else f"{bad} failures")
          sys.exit(1 if bad else 0)
          PY
